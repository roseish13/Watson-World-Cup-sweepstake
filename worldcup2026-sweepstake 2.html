<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Sweepstake</title>
<style>
:root {
  --green: #1a6b3c;
  --green-dark: #0e4526;
  --green-mid: #2d9a5f;
  --green-light: #e8f5ee;
  --gold: #c9920a;
  --gold-light: #fff8e6;
  --red: #c0392b;
  --bg: #f4f7f4;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #5a6b5a;
  --border: #d4e4d4;
  --radius: 10px;
  --live: #e53935;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

header {
  background: linear-gradient(150deg, #0a4a25 0%, #1a6b3c 55%, #155c32 100%);
  color: white; text-align: center; padding: 2rem 1rem 1.75rem; position: relative; overflow: hidden;
}
header::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 28px, rgba(255,255,255,0.025) 28px, rgba(255,255,255,0.025) 56px);
}
header .trophy { font-size: 2.5rem; margin-bottom: 0.4rem; position: relative; }
header h1 { font-size: clamp(1.5rem,5vw,2.2rem); font-weight: 700; letter-spacing: -0.3px; position: relative; }
header p { color: rgba(255,255,255,0.7); margin-top: 0.3rem; font-size: 0.9rem; position: relative; }
.dates-badge {
  display: inline-block; background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
  padding: 0.2rem 0.9rem; font-size: 0.82rem; margin-top: 0.6rem; position: relative;
}
.live-banner {
  display: none; background: var(--live); color: white;
  text-align: center; padding: 0.4rem; font-size: 0.82rem; font-weight: 600;
  letter-spacing: 0.05em;
}
.live-banner.show { display: block; }
.live-dot { display: inline-block; width: 8px; height: 8px; background: white; border-radius: 50%; margin-right: 6px; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

main { max-width: 920px; margin: 0 auto; padding: 1.25rem 0.85rem 3rem; }

.tabs { display: flex; gap: 5px; margin-bottom: 1.25rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
.tab { flex: 1; padding: 0.55rem 0.4rem; border: none; background: transparent; border-radius: 7px; font-size: 0.85rem; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.15s; white-space: nowrap; }
.tab.active { background: var(--green); color: white; }

.section { display: none; }
.section.active { display: block; }

/* ── LIVE SCORES ── */
.live-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 10px; margin-bottom: 1.5rem; }
.live-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.live-card-header { background: var(--live); color: white; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 10px; display: flex; align-items: center; gap: 6px; }
.live-card-body { padding: 0.75rem 1rem; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
.ls-team { font-size: 0.88rem; font-weight: 500; }
.ls-team.right { text-align: right; }
.ls-score { font-size: 1.5rem; font-weight: 700; text-align: center; color: var(--green-dark); }
.ls-owner { font-size: 0.72rem; color: var(--green); font-weight: 600; margin-top: 2px; }
.ls-owner.right { text-align: right; }
.ls-flag { font-size: 1.1rem; }
.ls-minute { font-size: 0.75rem; color: var(--live); font-weight: 600; text-align: center; margin-top: 2px; }

/* ── FIXTURES ── */
.search-bar { width: 100%; padding: 0.6rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.92rem; margin-bottom: 1rem; background: var(--card); outline: none; color: var(--text); }
.search-bar:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(45,154,95,0.1); }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.1rem; }
.pill { padding: 4px 11px; border: 1px solid var(--border); border-radius: 20px; font-size: 0.8rem; cursor: pointer; background: var(--card); color: var(--muted); transition: all 0.12s; }
.pill.active, .pill:hover { background: var(--green); color: white; border-color: var(--green); }
.fixture-day { margin-bottom: 1.4rem; }
.day-header { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 0.35rem 0; border-bottom: 2px solid var(--green-light); margin-bottom: 0.65rem; }
.fixture { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.65rem 0.9rem; margin-bottom: 7px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
.fixture.highlight { border-left: 3px solid var(--gold); background: var(--gold-light); }
.fixture.live-now { border-left: 3px solid var(--live); background: #fff5f5; }
.fixture.finished { opacity: 0.8; }
.team-side { display: flex; align-items: center; gap: 7px; }
.team-side.right { justify-content: flex-end; flex-direction: row-reverse; text-align: right; }
.fixture-flag { font-size: 1.2rem; }
.fixture-team-name { font-weight: 500; font-size: 0.88rem; }
.fixture-owner { font-size: 0.72rem; color: var(--green); font-weight: 600; }
.fixture-meta { text-align: center; min-width: 60px; }
.score-display { font-size: 1.1rem; font-weight: 700; color: var(--green-dark); }
.vs-badge { display: inline-block; background: var(--green-light); color: var(--green); font-weight: 700; font-size: 0.72rem; padding: 2px 7px; border-radius: 4px; }
.fixture-time { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
.live-badge { display: inline-block; background: var(--live); color: white; font-size: 0.68rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; }

/* ── STANDINGS ── */
.standings-group { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.standings-header { background: var(--green); color: white; padding: 0.5rem 0.9rem; font-weight: 700; font-size: 0.88rem; display: flex; align-items: center; gap: 8px; }
.standings-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.standings-table th { padding: 5px 8px; text-align: center; color: var(--muted); font-weight: 600; font-size: 0.72rem; text-transform: uppercase; border-bottom: 1px solid var(--border); background: #fafcfa; }
.standings-table th:first-child { text-align: left; padding-left: 12px; }
.standings-table td { padding: 7px 8px; text-align: center; border-bottom: 1px solid #f0f4f0; }
.standings-table td:first-child { text-align: left; padding-left: 12px; }
.standings-table tr:last-child td { border-bottom: none; }
.standings-table tr.qualify { background: rgba(26,107,60,0.04); }
.standings-table tr.qualify td:first-child { border-left: 3px solid var(--green-mid); }
.s-team-cell { display: flex; align-items: center; gap: 7px; font-weight: 500; }
.s-owner { font-size: 0.68rem; color: var(--green); font-weight: 600; display: block; }
.pos-num { font-weight: 700; color: var(--muted); font-size: 0.8rem; margin-right: 4px; }
td.pts { font-weight: 700; color: var(--green-dark); }

/* ── PLAYERS ── */
.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 10px; }
.player-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.player-header { background: var(--green); color: white; padding: 0.55rem 0.9rem; display: flex; align-items: center; gap: 9px; }
.player-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; }
.player-name { font-weight: 600; font-size: 0.95rem; }
.team-list { padding: 0.65rem 0.9rem; }
.team-item { display: flex; align-items: center; gap: 7px; padding: 4px 0; border-bottom: 1px solid #f0f4f0; font-size: 0.86rem; }
.team-item:last-child { border-bottom: none; }
.team-group-badge { font-size: 0.72rem; background: var(--green-light); color: var(--green); padding: 1px 6px; border-radius: 10px; font-weight: 600; margin-left: auto; }
.team-score-info { font-size: 0.72rem; color: var(--muted); margin-left: 4px; }

/* ── LOADING ── */
.loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.last-updated { font-size: 0.72rem; color: var(--muted); text-align: right; margin-bottom: 0.75rem; }
.error-msg { background: #fff5f5; border: 1px solid #fcc; border-radius: var(--radius); padding: 1rem; font-size: 0.88rem; color: #c0392b; margin-bottom: 1rem; }

@media (max-width: 480px) {
  .fixture { grid-template-columns: 1fr auto 1fr; gap: 5px; padding: 0.55rem 0.65rem; }
  .fixture-flag { font-size: 1rem; }
  .fixture-team-name { font-size: 0.82rem; }
  .standings-table { font-size: 0.78rem; }
  .tab { font-size: 0.78rem; padding: 0.5rem 0.3rem; }
}
</style>
</head>

// Group table template
const GROUPS = {
  A:["Mexico","South Africa","South Korea","Czechia"],
  B:["Canada","Bosnia and Herzegovina","Qatar","Switzerland"],
  C:["Brazil","Morocco","Haiti","Scotland"],
  D:["United States","Paraguay","Australia","Turkiye"],
  E:["Germany","Curacao","Ivory Coast","Ecuador"],
  F:["Netherlands","Japan","Sweden","Tunisia"],
  G:["Belgium","Egypt","Iran","New Zealand"],
  H:["Spain","Cape Verde","Saudi Arabia","Uruguay"],
  I:["France","Senegal","Iraq","Norway"],
  J:["Argentina","Algeria","Austria","Jordan"],
  K:["Portugal","DR Congo","Uzbekistan","Colombia"],
  L:["England","Croatia","Ghana","Panama"],
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let fixturesData = [...FALLBACK_FIXTURES];
let standingsData = {};
let currentSearch = '';
let currentFilter = 'all';
let liveMatches = [];

// ─── API FETCH ────────────────────────────────────────────────────────────────
const API = 'https://worldcup26.ir/get';

async function fetchData() {
  try {
    const [gamesRes, groupsRes] = await Promise.all([
      fetch(`${API}/games`),
      fetch(`${API}/groups`)
    ]);
    if (gamesRes.ok) {
      const games = await gamesRes.json();
      processGames(games);
    }
    if (groupsRes.ok) {
      const groups = await groupsRes.json();
      processGroups(groups);
    }
    document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString('en-GB');
  } catch(e) {
    console.log('API unavailable, using built-in data');
    buildFallbackStandings();
  }
  renderAll();
}

function processGames(data) {
  // API may return array or {games: [...]}
  const games = Array.isArray(data) ? data : (data.games || data.matches || []);
  if (!games.length) return;
  fixturesData = games.map(g => {
    const home = g.homeTeam || g.home_team || g.team1 || {};
    const away = g.awayTeam || g.away_team || g.team2 || {};
    const homeName = typeof home === 'string' ? home : (home.name || home.country || '');
    const awayName = typeof away === 'string' ? away : (away.name || away.country || '');
    const score = g.score || g.result || {};
    const homeScore = score.home ?? score.ft_score1 ?? g.score1 ?? null;
    const awayScore = score.away ?? score.ft_score2 ?? g.score2 ?? null;
    const status = (g.status || '').toLowerCase();
    const isLive = status === 'live' || status === 'in_play' || status === 'inprogress';
    const isFinished = status === 'finished' || status === 'ft' || status === 'complete';
    return {
      id: g.id || g._id,
      date: g.date || '',
      homeTeam: homeName,
      awayTeam: awayName,
      homeScore: homeScore,
      awayScore: awayScore,
      status: isLive ? 'live' : (isFinished ? 'finished' : 'upcoming'),
      minute: g.minute || g.matchMinute || '',
      group: g.group || g.groupId || '',
      bstTime: g.bstTime || g.time || '',
    };
  });
  liveMatches = fixturesData.filter(f => f.status === 'live');
  document.getElementById('live-banner').classList.toggle('show', liveMatches.length > 0);
}

function processGroups(data) {
  // Try to extract standings from API
  const groups = Array.isArray(data) ? data : (data.groups || data.standings || []);
  groups.forEach(g => {
    const grpName = g.group || g.name || g.id;
    const letter = grpName.replace(/group\s*/i,'').trim().toUpperCase();
    const teams = g.teams || g.standings || [];
    if (teams.length) {
      standingsData[letter] = teams.map(t => ({
        team: t.team || t.name || t.country || '',
        played: t.played || t.mp || t.gamesPlayed || 0,
        won: t.won || t.w || 0,
        drawn: t.drawn || t.d || 0,
        lost: t.lost || t.l || 0,
        gf: t.goalsFor || t.gf || t.scored || 0,
        ga: t.goalsAgainst || t.ga || t.conceded || 0,
        gd: t.goalDifference || t.gd || 0,
        pts: t.points || t.pts || 0,
      }));
    }
  });
}

function buildFallbackStandings() {
  // Build standings from finished fallback fixtures
  Object.entries(GROUPS).forEach(([letter, teams]) => {
    const table = {};
    teams.forEach(t => { table[t] = {team:t,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0}; });
    fixturesData.filter(f => f.group===letter && f.status==='finished' && f.homeScore!==null).forEach(f => {
      const h = table[f.homeTeam], a = table[f.awayTeam];
      if (!h || !a) return;
      h.played++; a.played++;
      h.gf += +f.homeScore; h.ga += +f.awayScore;
      a.gf += +f.awayScore; a.ga += +f.homeScore;
      h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
      if (+f.homeScore > +f.awayScore) { h.won++; h.pts+=3; a.lost++; }
      else if (+f.homeScore < +f.awayScore) { a.won++; a.pts+=3; h.lost++; }
      else { h.drawn++; h.pts++; a.drawn++; a.pts++; }
    });
    standingsData[letter] = Object.values(table).sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
  });
}

// ─── RENDER FIXTURES ─────────────────────────────────────────────────────────
function renderFixtures(search) {
  if (search !== undefined) currentSearch = search;
  const today = new Date().toISOString().slice(0,10);

  let list = fixturesData.filter(f => {
    const ho = getOwner(f.homeTeam), ao = getOwner(f.awayTeam);
    if (currentFilter === 'sweep' && !ho && !ao) return false;
    if (currentFilter === 'today' && f.date !== today) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      if (!(f.homeTeam||'').toLowerCase().includes(q) &&
          !(f.awayTeam||'').toLowerCase().includes(q) &&
          !(ho||'').toLowerCase().includes(q) &&
          !(ao||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  // Render live section
  const liveSection = document.getElementById('live-section');
  const liveNow = fixturesData.filter(f => f.status === 'live');
  if (liveNow.length) {
    liveSection.innerHTML = `<div style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--live);margin-bottom:8px;">🔴 Live now</div>
    <div class="live-grid">${liveNow.map(f => {
      const ho = getOwner(f.homeTeam), ao = getOwner(f.awayTeam);
      return `<div class="live-card">
        <div class="live-card-header"><span class="live-dot"></span> LIVE ${f.minute ? '· '+f.minute+"'" : ''}</div>
        <div class="live-card-body">
          <div><div class="ls-team">${flag(f.homeTeam)} ${f.homeTeam}</div>${ho?`<div class="ls-owner">🏅 ${ho}</div>`:''}</div>
          <div><div class="ls-score">${f.homeScore ?? '–'} : ${f.awayScore ?? '–'}</div></div>
          <div style="text-align:right"><div class="ls-team right">${f.awayTeam} ${flag(f.awayTeam)}</div>${ao?`<div class="ls-owner right">🏅 ${ao}</div>`:''}</div>
        </div></div>`;
    }).join('')}</div>`;
  } else { liveSection.innerHTML = ''; }

  // Group by date
  const byDate = {};
  list.forEach(f => {
    const d = f.date || 'TBC';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(f);
  });

  const fmt = d => {
    try { return new Date(d).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
    catch(e) { return d; }
  };

  const el = document.getElementById('fixture-list');
  if (!Object.keys(byDate).length) {
    el.innerHTML = '<p style="color:var(--muted);text-align:center;padding:2rem">No matches found.</p>';
    return;
  }
  el.innerHTML = Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).map(([date, matches]) => `
    <div class="fixture-day">
      <div class="day-header">${fmt(date)}</div>
      ${matches.map(f => {
        const ho = getOwner(f.homeTeam), ao = getOwner(f.awayTeam);
        const isSweep = ho || ao;
        const cls = f.status==='live' ? 'fixture live-now' : (isSweep ? 'fixture highlight' : 'fixture') + (f.status==='finished' ? ' finished' : '');
        const scoreEl = (f.homeScore !== null && f.homeScore !== undefined)
          ? `<div class="score-display">${f.homeScore} – ${f.awayScore}</div>`
          : `<div class="vs-badge">VS</div>`;
        return `<div class="${cls}">
          <div class="team-side">
            <span class="fixture-flag">${flag(f.homeTeam)}</span>
            <div><div class="fixture-team-name">${f.homeTeam}</div>${ho?`<div class="fixture-owner">🏅 ${ho}</div>`:''}</div>
          </div>
          <div class="fixture-meta">
            ${f.status==='live'?`<div class="live-badge">🔴 LIVE</div>`:scoreEl}
            <div class="fixture-time">${f.bstTime||f.time||''}</div>
            ${f.group?`<div style="font-size:0.68rem;color:var(--muted);margin-top:1px">Group ${f.group}</div>`:''}
          </div>
          <div class="team-side right">
            <span class="fixture-flag">${flag(f.awayTeam)}</span>
            <div><div class="fixture-team-name">${f.awayTeam}</div>${ao?`<div class="fixture-owner">🏅 ${ao}</div>`:''}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

// ─── RENDER STANDINGS ─────────────────────────────────────────────────────────
function renderStandings() {
  const el = document.getElementById('standings-list');
  const letters = Object.keys(standingsData).sort();
  if (!letters.length) {
    el.innerHTML = '<div class="loading">Standings will appear once matches kick off.</div>';
    return;
  }
  el.innerHTML = letters.map(letter => {
    const rows = standingsData[letter] || [];
    return `<div class="standings-group">
      <div class="standings-header">Group ${letter}</div>
      <table class="standings-table">
        <thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>
        <tbody>${rows.map((t,i) => {
          const owner = getOwner(t.team);
          const qualify = i < 2 ? ' qualify' : '';
          return `<tr class="${qualify}">
            <td><div class="s-team-cell"><span class="pos-num">${i+1}</span>${flag(t.team)} <div>${t.team}${owner?`<span class="s-owner">🏅 ${owner}</span>`:''}</div></div></td>
            <td>${t.played}</td><td>${t.won}</td><td>${t.drawn}</td><td>${t.lost}</td>
            <td>${t.gf}</td><td>${t.ga}</td><td>${t.gd > 0 ? '+'+t.gd : t.gd}</td>
            <td class="pts">${t.pts}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
  }).join('');
}

// ─── RENDER PLAYERS ───────────────────────────────────────────────────────────
function renderPlayers() {
  const grid = document.getElementById('player-grid');
  grid.innerHTML = PLAYERS.map(p => {
    const teamItems = p.teams.map(t => {
      const grpLetter = Object.entries(GROUPS).find(([,ts]) => ts.some(x => x.toLowerCase()===t.toLowerCase()))?.[0] || '?';
      const standing = standingsData[grpLetter];
      let posInfo = '';
      if (standing) {
        const pos = standing.findIndex(s => s.team.toLowerCase() === t.toLowerCase());
        if (pos !== -1) posInfo = `<span class="team-score-info">${pos+1}${pos===0?'st':pos===1?'nd':pos===2?'rd':'th'} in grp</span>`;
      }
      return `<div class="team-item">
        <span>${flag(t)}</span>
        <span>${t}</span>
        ${posInfo}
        <span class="team-group-badge">Grp ${grpLetter}</span>
      </div>`;
    }).join('');
    return `<div class="player-card">
      <div class="player-header">
        <div class="player-avatar">${p.name.slice(0,2).toUpperCase()}</div>
        <div class="player-name">${p.name}</div>
      </div>
      <div class="team-list">${teamItems}</div>
    </div>`;
  }).join('');
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
}

function setFilter(val, el) {
  currentFilter = val;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderFixtures();
}

function renderAll() {
  buildFallbackStandings(); // update from live data
  renderFixtures();
  renderStandings();
  renderPlayers();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Render immediately with fallback data
buildFallbackStandings();
renderFixtures();
renderStandings();
renderPlayers();

// Then try to fetch live data
fetchData();

// Auto-refresh every 60 seconds
setInterval(fetchData, 60000);
</script>
